name: Google Indexing After Deploy

on:
  push:
    branches: [main]

jobs:
  index:
    name: Submit URLs to Google Indexing API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for Vercel deployment to succeed
        id: wait
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_m9kjFpZW2jnk9R3o4RyKxTqsSHlA
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "⏳ Waiting for Vercel deployment (commit: $COMMIT_SHA)..."
          TIMEOUT=300   # 5 minutes max
          INTERVAL=15
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            RESPONSE=$(curl -s \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&limit=5&target=production" \
              -H "Authorization: Bearer $VERCEL_TOKEN")

            # Find deployment matching current commit
            STATUS=$(echo "$RESPONSE" | python3 -c "
          import json, sys, os
          sha = os.environ['COMMIT_SHA']
          data = json.load(sys.stdin)
          for d in data.get('deployments', []):
              meta = d.get('meta', {})
              if meta.get('githubCommitSha', '').startswith(sha[:7]) or sha.startswith(meta.get('githubCommitSha','')[:7]):
                  print(d.get('state', 'UNKNOWN'))
                  break
          else:
              print('PENDING')
          " 2>/dev/null || echo "PENDING")

            echo "  Status: $STATUS (${ELAPSED}s elapsed)"

            if [ "$STATUS" = "READY" ]; then
              echo "✅ Deployment succeeded"
              echo "status=success" >> $GITHUB_OUTPUT
              break
            elif [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "⚠️ Timeout waiting for deployment, submitting anyway..."
            echo "status=timeout" >> $GITHUB_OUTPUT
          fi

      - name: Write Google Service Account key
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > gsc-service-account.json

      - name: Install tsx
        run: npm install -g tsx --quiet

      - name: Submit blog URLs to Google Indexing API
        run: npx tsx scripts/request-indexing.ts

      - name: Cleanup key file
        if: always()
        run: rm -f gsc-service-account.json
